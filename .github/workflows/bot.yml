name: Discord Bot Updater

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Discord Bot
        env:
          STATUS_WEBHOOK: ${{ secrets.STATUS_WEBHOOK }}
          HYPE_WEBHOOK: ${{ secrets.HYPE_WEBHOOK }}
        run: python bot.py

      - name: Force Save State Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add discord_msg_id.txt discord_alert_state.txt || true
          git commit -m "Auto-update Discord state files" || true
          git pull --rebase || true
          git push
