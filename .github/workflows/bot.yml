name: Discord Bot Updater

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Discord Bot
        env:
          STATUS_WEBHOOK: ${{ secrets.STATUS_WEBHOOK }}
          HYPE_WEBHOOK: ${{ secrets.HYPE_WEBHOOK }}
        run: python bot.py

      - name: Commit and Push State Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Discord state files"
          file_pattern: "*.txt"
